name: Release Rust Action

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release Rust Action
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build action
        run: npm run build

      - name: Test action
        run: npm test

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          name: "BoringCache Rust ${{ github.ref_name || github.event.inputs.tag }}"
          body: |
            **Cache once. Reuse everywhere.**

            A universal build cache for CI, Docker, and local dev. Reuse what you already built—without re-uploading.

            Setup Rust via rustup and cache Rust, cargo, and target directory via BoringCache.

            See [README](https://github.com/boringcache/rust-action) for usage guide.
          draft: false
          prerelease: false

  update-major-version:
    name: Update Major Version Tag
    runs-on: ubuntu-latest
    needs: build-and-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update major version tag
        run: |
          TAG="${{ github.ref_name }}"
          MAJOR_VERSION=$(echo "$TAG" | cut -d. -f1)

          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Fetch tags with force to avoid clobber error
          git fetch origin --tags --force

          # Delete local major version tag if exists
          git tag -d "$MAJOR_VERSION" 2>/dev/null || true

          # Create tag pointing to the release tag
          git tag -a "$MAJOR_VERSION" -m "Update $MAJOR_VERSION to $TAG" "$TAG"
          git push origin "$MAJOR_VERSION" --force
